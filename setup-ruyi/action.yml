name: Setup Ruyi
description: Install RuyiSDK package manager, configure repositories, restore caches, and optionally update metadata.
author: RuyiSDK

branding:
  icon: package
  color: red

inputs:
  setup-python:
    description: Run actions/setup-python before installing Ruyi.
    required: false
    default: "true"
  python-version:
    description: Python version passed to actions/setup-python when setup-python is true.
    required: false
    default: "3.x"
  version:
    description: Ruyi version to install from PyPI. Leave empty to install the latest version selected by pip.
    required: false
    default: ""
  install-spec:
    description: Full pip requirement specifier. Overrides version when set.
    required: false
    default: ""
  pip-extra-args:
    description: Extra arguments passed to pip install.
    required: false
    default: ""
  cache:
    description: Restore and save Ruyi package manager cache and installed package state.
    required: false
    default: "true"
  cache-version:
    description: Manual cache namespace bump.
    required: false
    default: "v1"
  update:
    description: Run ruyi update after installation and configuration.
    required: false
    default: "true"
  repo-remote:
    description: Override the default Ruyi metadata repository remote URL.
    required: false
    default: ""
  repo-branch:
    description: Override the default Ruyi metadata repository branch.
    required: false
    default: ""
  repo-local:
    description: Override the default local repository path. Must be absolute.
    required: false
    default: ""
  extra-config:
    description: Extra TOML appended to the generated Ruyi user config.
    required: false
    default: ""
  telemetry:
    description: Ruyi telemetry mode for CI. Use off, local, or on. The on mode uploads in a post-run step.
    required: false
    default: "on"

outputs:
  ruyi-bin:
    description: Absolute path to the installed ruyi executable.
    value: ${{ steps.install.outputs.ruyi-bin }}
  ruyi-version:
    description: Installed Ruyi version.
    value: ${{ steps.install.outputs.ruyi-version }}
  python-venv:
    description: Python virtual environment used to install Ruyi.
    value: ${{ steps.install.outputs.python-venv }}
  cache-root:
    description: Ruyi XDG cache root.
    value: ${{ steps.install.outputs.cache-root }}
  data-root:
    description: Ruyi XDG data root.
    value: ${{ steps.install.outputs.data-root }}
  state-root:
    description: Ruyi XDG state root.
    value: ${{ steps.install.outputs.state-root }}
  config-root:
    description: Ruyi XDG config root.
    value: ${{ steps.install.outputs.config-root }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: ${{ inputs.setup-python == 'true' }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Restore Ruyi caches
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/ruyi
          ~/.local/share/ruyi
          ~/.local/state/ruyi
        key: ${{ runner.os }}-ruyi-${{ inputs.version }}-${{ inputs.cache-version }}
        restore-keys: |
          ${{ runner.os }}-ruyi-${{ inputs.version }}-
          ${{ runner.os }}-ruyi-

    - name: Install and configure Ruyi
      id: install
      shell: bash
      env:
        INPUT_SETUP_PYTHON: ${{ inputs.setup-python }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_INSTALL_SPEC: ${{ inputs.install-spec }}
        INPUT_PIP_EXTRA_ARGS: ${{ inputs.pip-extra-args }}
        INPUT_UPDATE: ${{ inputs.update }}
        INPUT_REPO_REMOTE: ${{ inputs.repo-remote }}
        INPUT_REPO_BRANCH: ${{ inputs.repo-branch }}
        INPUT_REPO_LOCAL: ${{ inputs.repo-local }}
        INPUT_EXTRA_CONFIG: ${{ inputs.extra-config }}
        INPUT_TELEMETRY: ${{ inputs.telemetry }}
      run: |
        set -euo pipefail

        case "$INPUT_TELEMETRY" in
          off|local|on) ;;
          *)
            echo "::error::telemetry must be one of: off, local, on"
            exit 2
            ;;
        esac

        case "$INPUT_SETUP_PYTHON" in
          true|false) ;;
          *)
            echo "::error::setup-python must be true or false"
            exit 2
            ;;
        esac

        install_root="${RUNNER_TOOL_CACHE:-$HOME/.cache/actions}/ruyi-python"
        if [ -n "$INPUT_VERSION" ]; then
          install_root="$install_root/$INPUT_VERSION"
        else
          install_root="$install_root/latest"
        fi

        python -m venv "$install_root"

        case "${RUNNER_OS:-Linux}" in
          Windows)
            python_bin="$install_root/Scripts/python"
            ruyi_bin="$install_root/Scripts/ruyi.exe"
            bin_dir="$install_root/Scripts"
            ;;
          *)
            python_bin="$install_root/bin/python"
            ruyi_bin="$install_root/bin/ruyi"
            bin_dir="$install_root/bin"
            ;;
        esac

        "$python_bin" -m pip install --upgrade pip

        if [ -n "$INPUT_INSTALL_SPEC" ]; then
          install_spec="$INPUT_INSTALL_SPEC"
        elif [ -n "$INPUT_VERSION" ]; then
          install_spec="ruyi==$INPUT_VERSION"
        else
          install_spec="ruyi"
        fi

        # shellcheck disable=SC2086
        "$python_bin" -m pip install --upgrade $INPUT_PIP_EXTRA_ARGS "$install_spec"

        echo "$bin_dir" >> "$GITHUB_PATH"

        config_home="${XDG_CONFIG_HOME:-$HOME/.config}"
        cache_home="${XDG_CACHE_HOME:-$HOME/.cache}"
        data_home="${XDG_DATA_HOME:-$HOME/.local/share}"
        state_home="${XDG_STATE_HOME:-$HOME/.local/state}"

        config_root="$config_home/ruyi"
        cache_root="$cache_home/ruyi"
        data_root="$data_home/ruyi"
        state_root="$state_home/ruyi"

        mkdir -p "$config_root" "$cache_root" "$data_root" "$state_root"

        if [ "$INPUT_TELEMETRY" = "off" ]; then
          export RUYI_TELEMETRY_OPTOUT=1
          echo "RUYI_TELEMETRY_OPTOUT=1" >> "$GITHUB_ENV"
        elif [ "$INPUT_TELEMETRY" = "on" ]; then
          "$ruyi_bin" telemetry consent
        else
          "$ruyi_bin" config set telemetry.mode "$INPUT_TELEMETRY"
        fi

        if [ -n "$INPUT_REPO_REMOTE" ]; then
          "$ruyi_bin" config set repo.remote "$INPUT_REPO_REMOTE"
        fi

        if [ -n "$INPUT_REPO_BRANCH" ]; then
          "$ruyi_bin" config set repo.branch "$INPUT_REPO_BRANCH"
        fi

        if [ -n "$INPUT_REPO_LOCAL" ]; then
          "$ruyi_bin" config set repo.local "$INPUT_REPO_LOCAL"
        fi

        if [ -n "$INPUT_EXTRA_CONFIG" ]; then
          printf '\n%s\n' "$INPUT_EXTRA_CONFIG" >> "$config_root/config.toml"
        fi

        if [ "$INPUT_UPDATE" = "true" ]; then
          "$ruyi_bin" update
        elif [ "$INPUT_UPDATE" != "false" ]; then
          echo "::error::update must be true or false"
          exit 2
        fi

        installed_version="$("$python_bin" -c 'from ruyi.version import RUYI_SEMVER; print(RUYI_SEMVER)')"

        {
          echo "ruyi-bin=$ruyi_bin"
          echo "ruyi-version=$installed_version"
          echo "python-venv=$install_root"
          echo "config-root=$config_root"
          echo "cache-root=$cache_root"
          echo "data-root=$data_root"
          echo "state-root=$state_root"
        } >> "$GITHUB_OUTPUT"

    - name: Prepare telemetry post-run action
      id: telemetry_helper
      if: ${{ inputs.telemetry == 'on' }}
      shell: bash
      run: |
        set -euo pipefail

        python - <<'PY'
        import os
        import pathlib
        import shutil
        import sys
        import tempfile

        workspace = pathlib.Path(os.environ["GITHUB_WORKSPACE"]).resolve()
        action_path = pathlib.Path(os.environ["GITHUB_ACTION_PATH"]).resolve()
        workspace_git_dir = workspace / ".git"

        if workspace_git_dir.is_dir() and not workspace_git_dir.is_symlink():
            helper_location = "git"
            helper_root = workspace_git_dir / "ruyi-actions"
        else:
            helper_location = "workspace"
            helper_root = workspace / ".ruyi-actions"

        helper_dir = helper_root / "telemetry-upload"

        if helper_root.is_symlink() or helper_dir.is_symlink():
            print("::error::Refusing to prepare telemetry post-run action through a symlinked helper path.", file=sys.stderr)
            sys.exit(2)

        helper_dir.mkdir(parents=True, exist_ok=True)
        helper_path = helper_dir.resolve()
        try:
            helper_path.relative_to(workspace)
        except ValueError:
            print(f"::error::Refusing to prepare telemetry post-run action outside the workspace: {helper_path}", file=sys.stderr)
            sys.exit(2)

        exclude_file = workspace_git_dir / "info" / "exclude"
        try:
            if helper_location == "workspace" and exclude_file.is_file() and not exclude_file.is_symlink():
                exclude_text = exclude_file.read_text(encoding="utf-8", errors="ignore")
                if ".ruyi-actions/" not in {line.strip() for line in exclude_text.splitlines()}:
                    with exclude_file.open("a", encoding="utf-8") as file:
                        if exclude_text and not exclude_text.endswith("\n"):
                            file.write("\n")
                        file.write(".ruyi-actions/\n")
        except OSError:
            pass

        source_dir = action_path / "telemetry-upload"
        for filename in ("action.yml", "index.js"):
            source = source_dir / filename
            target = helper_dir / filename
            if target.is_symlink():
                print(f"::error::Refusing to replace symlinked telemetry helper file: {target}", file=sys.stderr)
                sys.exit(2)

            temp_name = None
            try:
                with tempfile.NamedTemporaryFile("wb", dir=helper_dir, prefix=f".{filename}.", delete=False) as temp_file:
                    temp_name = pathlib.Path(temp_file.name)
                    with source.open("rb") as source_file:
                        shutil.copyfileobj(source_file, temp_file)
                os.replace(temp_name, target)
            finally:
                if temp_name is not None:
                    try:
                        temp_name.unlink()
                    except FileNotFoundError:
                        pass

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            print(f"location={helper_location}", file=output)
        PY

    - name: Register telemetry upload from git metadata
      if: ${{ inputs.telemetry == 'on' && steps.telemetry_helper.outputs.location == 'git' }}
      uses: ./.git/ruyi-actions/telemetry-upload
      with:
        ruyi-bin: ${{ steps.install.outputs.ruyi-bin }}

    - name: Register telemetry upload from workspace
      if: ${{ inputs.telemetry == 'on' && steps.telemetry_helper.outputs.location == 'workspace' }}
      uses: ./.ruyi-actions/telemetry-upload
      with:
        ruyi-bin: ${{ steps.install.outputs.ruyi-bin }}
